name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: running tests and uploading coverage needs no write access
# to the repository via GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          channels: conda-forge,defaults
          activate-environment: test-env
          miniforge-version: latest

      - name: Install dependencies
        run: |
          conda install -y numpy scipy matplotlib tqdm ipywidgets polytope cvxopt cyipopt jax
          pip install pytest pytest-cov
          pip install --no-deps -e .
          # pounce-solver (the default solver) is pip-only and is imported at
          # import time; pyomo + pyomo-pounce enable the equation-oriented tests.
          pip install pounce-solver pyomo pyomo-pounce

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=opyrability --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
