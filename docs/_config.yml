# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: Opyrability's documentation.
author: Victor Alves - Carnegie Mellon University.
copyright: "2022-2026"  # Copyright year to be placed in the footer
logo: opyrability_logo.png  # Top-left logo, relative to the docs/ book root

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: 'auto'
  exclude_patterns: 
    - 'aps_connection.ipynb'
    - 'aspen_connection.ipynb'
    - 'idaes_connection.ipynb'
    - 'unisim_connection.ipynb'
    - 'membrane_reactor.ipynb'
    - 'operability_index_shower.ipynb'
    - 'dwsim_connection.ipynb'
    - 'gp_surrogate_dma-mr.ipynb'
    - 'gp_surrogate_shower.ipynb'
    - 'mlp_DWSIM_heat_exchanger.ipynb'
    # Notebooks below ship with their outputs already executed; skip
    # re-running them on every build.
    - 'dma_mr_design_intensification.ipynb'
    - 'dynamic_dma_mr.ipynb'
    - 'dynamic_hyper.ipynb'
    - 'dynamic_methods_comparison.ipynb'
    - 'dynamic_pyomo_collocation.ipynb'
    - 'dynamic_gp_narx.ipynb'
    - 'pounce_inverse_mapping.ipynb'
    - 'pyomo_models_mapping.ipynb'
    - 'rank_designs.ipynb'
  timeout: -1



# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/CODES-group/opyrability # Online location of your book
  path_to_book: docs  # Optional path to your book, relative to the repository root
  branch: main  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true
  extra_files:
    - images/
  
sphinx:
  extra_extensions:
  - 'sphinx.ext.autodoc'
  - 'sphinx.ext.napoleon'
  - 'sphinx.ext.viewcode'
  - 'sphinx.ext.autosummary'
  - 'sphinx.ext.autosectionlabel'

  config:
    autosummary_generate: True
    # Carnegie Mellon color scheme (Carnegie Red links/accents, light and
    # dark). The file lives in docs/_static and is copied into the build.
    html_css_files:
    - cmu.css
    # require.js enables interactive plotly figures (pan/rotate/zoom)
    # in the compiled HTML pages.
    html_js_files:
    - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js

launch_buttons:
  binderhub_url: "https://mybinder.org"  # The URL for your BinderHub (e.g., https://mybinder.org)
  colab_url: "https://colab.research.google.com"
  thebe                  : true